checkstyle:
  gradle:
    id: checkstyle
    default-task: checkstyle
    tasks:
      checkstyle: checkstyleMain
      gradleGroovy: |
        checkstyle {
           toolVersion = '10.12.4'
           configDirectory = file("${rootProject.projectDir}/.config/checkstyle")
        }
        dependencies {
            checkstyle 'com.puppycrawl.tools:checkstyle:10.12.4'
        }
      gradleKotlin: |
        checkstyle {
          toolVersion = "10.12.4"
          configDirectory = file("${rootProject.projectDir}/.config/checkstyle")
        }
        dependencies {
            checkstyle("com.puppycrawl.tools:checkstyle:10.12.4")
        }
  maven:
    id: org.apache.maven.plugins:maven-checkstyle-plugin
    version: 3.6.0
    tasks:
      check: check

pmd:
  gradle:
    id: pmd
    default-task: check
    tasks:
      check: check
  maven:
    id: org.apache.maven.plugins:maven-pmd-plugin
    version: 3.21.2
    default-task: check
    tasks:
      check: check
